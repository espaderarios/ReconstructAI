services:
  - type: web
    name: humanizer-ai-backend
    env: node
    plan: free
    buildCommand: npm install && cd backend && npm install && npm run build
    startCommand: cd backend && npm start
    envVars:
      - key: GROQ_API_KEY
        scope: build,runtime
      - key: PORT
        value: 3000
      - key: NODE_ENV
        value: production
